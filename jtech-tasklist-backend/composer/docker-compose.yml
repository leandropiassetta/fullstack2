version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tasklist-postgres
    environment:
      POSTGRES_DB: tasklist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tasklist_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasklist"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dev-services

networks:
  dev-services:
    driver: bridge

volumes:
  tasklist_pgdata:
